name: Release ARMv7

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Add ARMv7 target
        run: rustup target add armv7-unknown-linux-musleabihf

      - name: Build ARMv7 release binary
        run: cargo zigbuild -p sgm-mister-helper --release --target armv7-unknown-linux-musleabihf

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/armv7-unknown-linux-musleabihf/release/sgm-mister-helper dist/
          tar -C dist -czf dist/sgm-mister-helper-armv7.tar.gz sgm-mister-helper
          (cd dist && sha256sum sgm-mister-helper-armv7.tar.gz > sha256.txt)

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/sgm-mister-helper-armv7.tar.gz
            dist/sha256.txt
