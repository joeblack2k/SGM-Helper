name: Release ARMv7 + Anbernic + Windows + Steam Deck

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Windows cross toolchain
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@cargo-zigbuild

      - name: Install Zig
        uses: mlugg/setup-zig@v2

      - name: Add release targets
        run: |
          rustup target add armv7-unknown-linux-musleabihf
          rustup target add aarch64-unknown-linux-musl
          rustup target add x86_64-pc-windows-gnu
          rustup target add x86_64-unknown-linux-gnu

      - name: Build ARMv7 release binary
        run: cargo zigbuild -p sgm-mister-helper --release --target armv7-unknown-linux-musleabihf

      - name: Build Anbernic/KNULLI ARM64 release binary
        run: cargo zigbuild -p sgm-mister-helper --release --target aarch64-unknown-linux-musl

      - name: Build Windows release binary
        run: cargo build -p sgm-windows-helper --release --target x86_64-pc-windows-gnu

      - name: Build Steam Deck release binary
        run: cargo build -p sgm-steamdeck-helper --release --target x86_64-unknown-linux-gnu

      - name: Package artifacts
        run: |
          set -euo pipefail
          mkdir -p dist
          cp target/armv7-unknown-linux-musleabihf/release/sgm-mister-helper dist/
          cp target/aarch64-unknown-linux-musl/release/sgm-mister-helper dist/sgm-anbernic-helper
          cp target/x86_64-pc-windows-gnu/release/sgm-windows-helper.exe dist/
          cp target/x86_64-unknown-linux-gnu/release/sgm-steamdeck-helper dist/
          tar -C dist -czf dist/sgm-mister-helper-armv7.tar.gz sgm-mister-helper
          tar -C dist -czf dist/sgm-anbernic-helper-aarch64-unknown-linux-musl.tar.gz sgm-anbernic-helper
          zip -j dist/sgm-windows-helper-x86_64-pc-windows-gnu.zip dist/sgm-windows-helper.exe
          tar -C dist -czf dist/sgm-steamdeck-helper-x86_64-unknown-linux-gnu.tar.gz sgm-steamdeck-helper
          (
            cd dist
            sha256sum sgm-mister-helper-armv7.tar.gz > sha256.txt
            sha256sum sgm-anbernic-helper-aarch64-unknown-linux-musl.tar.gz >> sha256.txt
            sha256sum sgm-windows-helper-x86_64-pc-windows-gnu.zip >> sha256.txt
            sha256sum sgm-steamdeck-helper-x86_64-unknown-linux-gnu.tar.gz >> sha256.txt
          )

      - name: Prepare release notes
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          awk -v version="$version" '
            index($0, "## [" version "]") == 1 { capture = 1; next }
            /^## \[/ && capture { exit }
            capture { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/{$d;}' > dist/release-notes.md
          if [ ! -s dist/release-notes.md ]; then
            printf 'Release %s\n' "$GITHUB_REF_NAME" > dist/release-notes.md
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          body_path: dist/release-notes.md
          files: |
            dist/sgm-mister-helper-armv7.tar.gz
            dist/sgm-anbernic-helper-aarch64-unknown-linux-musl.tar.gz
            dist/sgm-windows-helper-x86_64-pc-windows-gnu.zip
            dist/sgm-steamdeck-helper-x86_64-unknown-linux-gnu.tar.gz
            dist/sha256.txt
